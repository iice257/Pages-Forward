<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pages Forward | Collection</title>
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/gifting-theme.css">
  
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23DFBD69' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='8' width='18' height='4' rx='1'/><path d='M12 8v13'/><path d='M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7'/><path d='M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5'/></svg>">
    
  <style>
      .coll-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
          gap: 1.5rem;
      }
      
      .coll-card {
          background: var(--bg3);
          border-radius: 12px;
          padding: 1.25rem;
          position: relative;
          display: flex;
          gap: 1rem;
          border: 1px solid var(--sand);
          align-items: flex-start;
      }
      
      .coll-card-img {
          width: 80px;
          aspect-ratio: 0.67;
          border-radius: 4px;
          overflow: hidden;
          flex-shrink: 0;
          box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      }
      
      .coll-card-img img {
          width: 100%;
          height: 100%;
          object-fit: cover;
      }
      
      .coll-content {
          flex: 1;
          min-width: 0;
      }
      
      .coll-title {
          font-family: var(--ff);
          font-size: 1rem;
          font-weight: 600;
          color: var(--ink);
          margin-bottom: 0.25rem;
          line-height: 1.2;
      }
      
      .coll-author {
          font-family: var(--fs);
          font-size: 0.75rem;
          color: var(--stone);
          margin-bottom: 0.75rem;
      }
      
      .coll-actions {
          display: flex;
          gap: 0.5rem;
          flex-wrap: wrap;
      }
      
      .status-btn {
          font-family: var(--fs);
          font-size: 0.6rem;
          padding: 0.3rem 0.6rem;
          border-radius: 2rem;
          border: 1px solid var(--sand);
          background: transparent;
          color: var(--umber);
          cursor: pointer;
          text-transform: uppercase;
          letter-spacing: 0.05em;
          transition: all 0.2s;
      }
      
      .status-btn:hover {
          background: var(--bg2);
          border-color: var(--umber);
      }
      
      .status-btn.active {
          background: var(--sage);
          color: #fff;
          border-color: var(--sage);
      }
      
      .remove-btn {
          position: absolute;
          top: 0.75rem;
          right: 0.75rem;
          width: 1.5rem;
          height: 1.5rem;
          border-radius: 50%;
          border: 1px solid var(--sand);
          background: var(--bg2);
          color: var(--stone);
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          font-size: 1rem;
          line-height: 1;
      }
      
      .remove-btn:hover {
          color: var(--red);
          border-color: var(--red);
      }
      
      .page-header-content {
          margin-bottom: 3rem;
          text-align: center;
      }
      
      .page-title {
          font-family: var(--ff);
          font-size: 3rem;
          color: var(--ink);
          margin-bottom: 0.5rem;
      }
      
      .page-subtitle {
          font-family: var(--fb);
          font-size: 1.1rem;
          color: var(--stone);
          font-style: italic;
      }
  </style>
</head>

<body>
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#DFBD69;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#F9ECA5;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#B88A44;stop-opacity:1" />
      </linearGradient>
    </defs>
  </svg>

  <!-- Backgrounds -->
  <div class="blur-c">
    <div class="blur-bg active" id="bb1" style="background-image: url('https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=600&h=900&fit=crop');"></div>
    <div class="blur-ov"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <a href="index.html" class="header-logo">
      Pages Forward
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#gold-grad)" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="8" width="18" height="4" rx="1" />
        <path d="M12 8v13" />
        <path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7" />
        <path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5" />
      </svg>
    </a>
    <div class="header-actions">
       <button class="btn-h btn-icon" id="themeToggle"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg></button>
       <a href="forward.html" class="btn-h">Decide</a>
       <a href="explore.html" class="btn-h">Explore</a>
    </div>
  </header>

  <div class="page-container">
      <div class="page-header-content">
          <h1 class="page-title">My Collection</h1>
          <p class="page-subtitle" id="collectionCount">Your curated library</p>
      </div>
      
      <div id="collectionGrid" class="coll-grid">
          <!-- Injected -->
      </div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script>
    (async function () {
      'use strict';
      
      const themeToggle = document.getElementById('themeToggle');
      if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      themeToggle.addEventListener('click', () => {
          const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
          localStorage.setItem('theme', isDark ? 'light' : 'dark');
      });

      await PF.State.init();
      if (!PF.State.isOnboardingComplete()) {
        window.location.href = 'index.html';
        return;
      }

      const grid = document.getElementById('collectionGrid');
      const countEl = document.getElementById('collectionCount');

      function renderCollection() {
        const books = PF.State.getCollectionBooks(PF.booksData);
        
        countEl.textContent = `${books.length} Books Collected`;
        
        // Random bg from collection if available
        if(books.length > 0) {
             const randomBook = books[Math.floor(Math.random() * books.length)];
             document.getElementById('bb1').style.backgroundImage = `url(${randomBook.coverImage})`;
        }

        if (books.length === 0) {
          grid.innerHTML = `
            <div style="grid-column: 1 / -1; text-align: center; padding: 4rem;">
              <h2 style="font-family:var(--ff); font-size:1.5rem; margin-bottom:1rem; color:var(--ink)">No books collected</h2>
              <a href="forward.html" class="add-btn" style="padding:0.8rem 1.5rem">Start Deciding</a>
            </div>
          `;
          return;
        }

        grid.innerHTML = books.map(book => {
          const status = PF.State.state.readingStatus[book.id] || 'to-read';
          return `
            <div class="coll-card">
               <button class="remove-btn" data-id="${book.id}">×</button>
               <div class="coll-card-img"><img src="${book.coverImage}"></div>
               <div class="coll-content">
                   <div class="coll-title">${book.title}</div>
                   <div class="coll-author">${book.author}</div>
                   <div class="coll-actions">
                      <button class="status-btn ${status === 'to-read' ? 'active' : ''}" data-id="${book.id}" data-status="to-read">To Read</button>
                      <button class="status-btn ${status === 'in-progress' ? 'active' : ''}" data-id="${book.id}" data-status="in-progress">Reading</button>
                      <button class="status-btn ${status === 'complete' ? 'active' : ''}" data-id="${book.id}" data-status="complete">Finished</button>
                   </div>
               </div>
            </div>
          `;
        }).join('');

        grid.querySelectorAll('.status-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = parseInt(btn.dataset.id);
            const status = btn.dataset.status;
            await PF.State.updateReadingStatus(id, status);
            renderCollection();
          });
        });
        
        grid.querySelectorAll('.remove-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                if(confirm('Remove this book from your collection?')) {
                     await PF.State.removeFromCollection(parseInt(btn.dataset.id));
                     renderCollection();
                }
            });
        });
      }

      renderCollection();
    })();
  </script>
</body>
</html>
