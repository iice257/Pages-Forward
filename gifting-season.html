<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pages Forward | Curated Book Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500&family=Jost:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23DFBD69' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='8' width='18' height='4' rx='1'/><path d='M12 8v13'/><path d='M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7'/><path d='M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5'/></svg>">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #f8f5f0;
      --bg2: #fdfcf9;
      --bg3: #f3ede4;
      --sand: #d8cfc2;
      --ink: #1a1815;
      --char: #2d2926;
      --umber: #4a4540;
      --esp: #5c5650;
      --stone: #7a736a;
      --clay: #9c948a;
      --olive: #5a6650;
      --sage: #6b7a62;
      --amber: #c4884a;
      --red: #a85454;
      --avail: #4a8c5a;
      --div: rgba(180, 170, 155, 0.3);
      --ff: 'Playfair Display', Georgia, serif;
      --fb: 'Source Serif 4', Georgia, serif;
      --fs: 'Jost', sans-serif;
      --ease: cubic-bezier(.4, 0, .2, 1);
      --ep: cubic-bezier(.22, .61, .36, 1);
      --dp: 600ms;
      --db: 300ms;
      --dm: 100ms
    }

    [data-theme="dark"] {
      --bg: #1a1816;
      --bg2: #141210;
      --bg3: #201e1b;
      --sand: #4a4640;
      --ink: #f5f2ed;
      --char: #ebe7e0;
      --umber: #d0c9be;
      --esp: #b5ada2;
      --stone: #958d82;
      --clay: #6e675e;
      --olive: #a8bd98;
      --sage: #b8caa8;
      --amber: #f0b870;
      --red: #d88888;
      --avail: #7ac08a;
      --div: rgba(100, 95, 85, 0.6)
    }

    html {
      font-size: 18px;
      -webkit-font-smoothing: antialiased
    }

    body {
      font-family: var(--fb);
      background: var(--bg);
      color: var(--char);
      min-height: 100vh;
      min-width: 1400px;
      /* Fixed layout width to resist zoom reflow */
      line-height: 1.7;
      overflow-x: auto;
      /* Allow scrolling if window is too small */
      overflow-y: hidden;
      opacity: 0;
      filter: blur(12px);
      /* Animation triggered by JS via .loaded class */
      transition: opacity 1.2s var(--ease), filter 1.2s var(--ease);
    }

    body.loaded {
      opacity: 1;
      filter: blur(0);
    }

    .blur-c {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden
    }

    .blur-bg {
      position: absolute;
      inset: -100px;
      background-size: cover;
      background-position: center;
      filter: blur(50px) saturate(1.3) brightness(1.1);
      opacity: 0;
      transform: scale(1.25);
      transition: opacity var(--db) var(--ease)
    }

    .blur-bg.active {
      opacity: .55
    }

    [data-theme="dark"] .blur-bg {
      filter: blur(50px) saturate(.7) brightness(.5)
    }

    [data-theme="dark"] .blur-bg.active {
      opacity: .5
    }

    .blur-ov {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
          rgba(248, 245, 240, .5) 0%,
          rgba(243, 237, 228, .6) 60%,
          rgba(235, 229, 219, .85) 100%)
    }

    [data-theme="dark"] .blur-ov {
      background: linear-gradient(to bottom,
          rgba(26, 24, 22, .55) 0%,
          rgba(20, 18, 16, .65) 60%,
          rgba(14, 12, 10, .9) 100%)
    }

    .bg-right {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 50%;
      background: var(--bg2);
      z-index: 1
    }

    [data-theme="dark"] .bg-right {
      background: var(--bg)
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2.5rem
    }

    .header-logo {
      font-family: var(--fs);
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--umber);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: .75rem;
      position: relative
    }

    .btn-h {
      height: 2.25rem;
      border-radius: 2rem;
      border: 1px solid var(--sand);
      background: var(--bg2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--dm) var(--ease);
      color: var(--umber)
    }

    .btn-h:hover {
      background: var(--char);
      color: var(--bg2);
      border-color: var(--char)
    }

    .btn-icon,
    .theme-toggle {
      width: 2.25rem;
      padding: 0;
    }

    .btn-icon svg,
    .theme-toggle svg {
      width: 1rem;
      height: 1rem;
      fill: currentColor;
    }

    .btn-control {
      padding: 0 1.25rem;
      font-family: var(--fs);
      font-size: .65rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase
    }

    .folder-btn {
      position: relative;
      width: 2.5rem;
      height: 2.25rem;
      background: transparent;
      border: 1px solid var(--sand);
      border-radius: 2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .folder-icon {
      width: 1.1rem;
      height: 1.1rem;
      fill: var(--umber);
      transition: fill var(--dm)
    }

    .folder-btn:hover {
      background: var(--char);
      border-color: var(--char)
    }

    .folder-btn:hover .folder-icon {
      fill: var(--bg2)
    }

    .folder-badge {
      position: absolute;
      top: -.3rem;
      right: -.3rem;
      min-width: 1.1rem;
      height: 1.1rem;
      border-radius: .55rem;
      background: var(--sage);
      color: #fff;
      font-family: var(--fs);
      font-size: .55rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 .3rem;
      opacity: 0;
      transform: scale(.5);
      transition: all var(--dm) var(--ease)
    }

    .folder-badge.visible {
      opacity: 1;
      transform: scale(1)
    }

    .coll-preview {
      position: absolute;
      top: calc(100% + .5rem);
      right: 0;
      width: 280px;
      background: var(--bg2);
      border: 1px solid var(--sand);
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(30, 25, 20, .15);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: all var(--dm) var(--ease);
      padding: 1rem;
      z-index: 200
    }

    .coll-preview.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0)
    }

    [data-theme="dark"] .coll-preview {
      box-shadow: 0 12px 40px rgba(0, 0, 0, .4)
    }

    .coll-items {
      display: flex;
      flex-direction: column;
      gap: .75rem;
      margin-bottom: 1rem
    }

    .coll-item {
      display: flex;
      gap: .75rem;
      align-items: center
    }

    .coll-thumb {
      width: 36px;
      height: 54px;
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0
    }

    .coll-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .coll-title {
      font-family: var(--ff);
      font-size: .75rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3
    }

    .coll-empty {
      font-family: var(--fs);
      font-size: .7rem;
      color: var(--stone);
      text-align: center;
      padding: 1rem 0
    }

    .view-all-btn {
      width: 100%;
      padding: .6rem;
      border: 1px solid var(--sand);
      border-radius: 2rem;
      background: transparent;
      font-family: var(--fs);
      font-size: .6rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--umber);
      cursor: pointer;
      transition: all var(--dm)
    }

    .view-all-btn:hover {
      background: var(--char);
      color: var(--bg2);
      border-color: var(--char)
    }

    .slider-vp {
      position: fixed;
      inset: 0;
      z-index: 2;
      overflow: hidden;
      padding-bottom: 150px
    }

    .slider-track {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slider-track.transitioning {
      animation: fadeBlur 600ms ease;
    }

    @keyframes fadeBlur {

      0%,
      100% {
        filter: blur(0);
      }

      50% {
        filter: blur(4px);
      }
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--dp) var(--ease);
      z-index: 1
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 2
    }

    .slide::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
      background: var(--div);
      z-index: 3
    }

    .panel-cover {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 5rem 2.5rem 5rem 3rem;
      overflow: hidden
    }

    .cover-c {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 300px
    }

    .book-cover {
      width: 100%;
      aspect-ratio: .67;
      border-radius: 0;
      overflow: hidden;
      box-shadow: -3px 0 0 rgba(30, 25, 20, .25), -6px 0 0 rgba(50, 45, 40, .12), 0 30px 60px -12px rgba(30, 25, 20, .45), -18px 18px 45px -12px rgba(30, 25, 20, .28)
    }

    [data-theme="dark"] .book-cover {
      box-shadow: -3px 0 0 rgba(0, 0, 0, .4), -6px 0 0 rgba(0, 0, 0, .2), 0 30px 60px -12px rgba(0, 0, 0, .6), -18px 18px 45px -12px rgba(0, 0, 0, .4), 0 0 80px -20px rgba(255, 245, 230, .08)
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .panel-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 5rem 4rem 5rem 2.5rem;
      overflow-y: auto
    }

    .content-w {
      max-width: 480px
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: .75rem
    }

    .book-title {
      font-family: var(--ff);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--ink);
      letter-spacing: -.02em;
      flex: 1
    }

    [data-theme="dark"] .book-title {
      text-shadow: 0 2px 16px rgba(0, 0, 0, .3)
    }

    .add-btn {
      flex-shrink: 0;
      padding: .4rem .9rem;
      border: 1px solid var(--sand);
      border-radius: 2rem;
      background: transparent;
      font-family: var(--fs);
      font-size: .55rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--umber);
      cursor: pointer;
      transition: all var(--dm) var(--ease);
      margin-top: .4rem;
      white-space: nowrap
    }

    .add-btn:hover:not(:disabled) {
      background: var(--char);
      color: var(--bg2);
      border-color: var(--char)
    }

    .add-btn.in-coll {
      background: var(--sage);
      color: #fff;
      border-color: var(--sage)
    }

    .add-btn.in-coll:hover {
      background: var(--amber);
      border-color: var(--amber)
    }

    .add-btn.reserved {
      background: var(--amber);
      color: #fff;
      border-color: var(--amber)
    }

    .add-btn.reserved:hover {
      background: var(--char);
      border-color: var(--char)
    }

    .add-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      background: var(--clay);
      color: var(--bg2);
      border-color: var(--clay)
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1rem
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%
    }

    .status-dot.avail {
      background: var(--avail)
    }

    .status-dot.reserved {
      background: var(--amber)
    }

    .status-dot.unavail {
      background: var(--red)
    }

    .status-text {
      font-family: var(--fs);
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .15em;
      text-transform: uppercase
    }

    .status-text.avail {
      color: var(--avail)
    }

    .status-text.reserved {
      color: var(--amber)
    }

    .status-text.unavail {
      color: var(--red)
    }

    .book-subtitle {
      font-family: var(--fb);
      font-size: 1rem;
      font-style: italic;
      color: var(--esp);
      margin-bottom: 1.5rem;
      padding-left: .9rem;
      border-left: 2px solid var(--sand)
    }

    .book-desc {
      margin-bottom: 1.25rem
    }

    .book-desc p {
      font-size: .95rem;
      line-height: 1.75;
      color: var(--umber);
      margin-bottom: .9rem;
      max-width: 46ch
    }

    .genre-tags {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      margin-bottom: 1.5rem
    }

    .genre-tag {
      padding: .3rem .7rem;
      background: var(--bg3);
      border: 1px solid var(--sand);
      border-radius: 2rem;
      font-family: var(--fs);
      font-size: .55rem;
      font-weight: 500;
      letter-spacing: .08em;
      color: var(--stone);
      text-transform: uppercase
    }

    .author-sec {
      padding-top: 1.25rem;
      border-top: 1px solid var(--sand)
    }

    .author-name {
      font-family: var(--ff);
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--char);
      margin-bottom: .15rem
    }

    .author-acc {
      font-family: var(--fs);
      font-size: .6rem;
      font-weight: 400;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--clay)
    }

    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background: var(--bg2);
      border: 1px solid var(--sand);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      transition: all var(--dm) var(--ease);
      box-shadow: 0 3px 12px rgba(30, 25, 20, .08)
    }

    .nav-arrow:hover {
      background: var(--char);
      border-color: var(--char)
    }

    .nav-arrow:hover svg {
      stroke: var(--bg2)
    }

    .nav-arrow svg {
      width: 1rem;
      height: 1rem;
      stroke: var(--umber);
      stroke-width: 2;
      fill: none
    }

    .nav-arrow.prev {
      left: 1.25rem
    }

    .nav-arrow.next {
      right: 1.25rem
    }

    .arc-car {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 140px;
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 16px;
      overflow: visible;
      pointer-events: none
    }

    .arc-car::before {
      content: '';
      position: absolute;
      top: -30px;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(to bottom, transparent, var(--bg) 30%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--div);
      z-index: -1;
      pointer-events: none
    }

    .arc-vp {
      position: relative;
      width: 100%;
      max-width: 700px;
      height: 100%;
      overflow: visible;
      pointer-events: auto
    }

    .arc-track {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 0;
    }

    .arc-slot {
      position: absolute;
      bottom: 0;
      left: 0;
      transform-origin: center bottom;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .4rem;
      cursor: pointer;
      width: 85px;
      margin-left: -42.5px;
      /* Center centered */
    }

    .arc-thumb {
      width: 48px;
      height: 72px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(30, 25, 20, .12);
      border: 2px solid transparent;
      background: var(--bg3);
      position: relative;
    }

    .arc-thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity var(--dp) var(--ep);
    }

    .arc-thumb img.active {
      opacity: 1;
    }

    /* Slot specific styling - Static */
    .arc-slot[data-pos="0"] .arc-thumb {
      width: 56px;
      height: 84px;
      border-color: var(--char);
      box-shadow: 0 8px 28px rgba(30, 25, 20, .3);
      border-radius: 12px;
    }

    .arc-slot:not([data-pos="0"]) .arc-thumb {
      filter: blur(1px);
      opacity: .7;
    }

    .arc-label-c {
      position: relative;
      height: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .arc-slot:not([data-pos="0"]) .arc-label {
      filter: blur(2px);
      /* Blurred non-selected text */
      opacity: .4;
    }

    .arc-label {
      position: absolute;
      top: 0;
      font-family: var(--ff);
      font-size: .58rem;
      font-weight: 500;
      color: var(--stone);
      white-space: nowrap;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      transition: opacity var(--dp) var(--ep), filter var(--dp) var(--ep);
    }

    .arc-label.active {
      opacity: .5;
    }

    .arc-label:not(.active) {
      opacity: 0 !important;
      /* Force hide inactive layer to prevent ghosting */
    }

    /* Override for selected */
    .arc-slot[data-pos="0"] .arc-label {
      filter: blur(0);
    }

    .arc-slot[data-pos="0"] .arc-label.active {
      opacity: 1;
      font-size: .72rem;
      font-weight: 500;
      color: var(--ink);
      max-width: 140px;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      line-height: 1.1;
      height: auto;
    }

    .arc-slot[data-pos="-3"] {
      transform: translateX(-204px) rotate(-7.5deg) translateY(3px) scale(.75)
    }

    .arc-slot[data-pos="-2"] {
      transform: translateX(-136px) rotate(-5deg) translateY(-5px) scale(.85)
    }

    .arc-slot[data-pos="-1"] {
      transform: translateX(-68px) rotate(-2.5deg) translateY(-11px) scale(.95)
    }

    .arc-slot[data-pos="0"] {
      transform: translateX(0) rotate(0) translateY(-21px) scale(1.1)
    }

    .arc-slot[data-pos="1"] {
      transform: translateX(68px) rotate(2.5deg) translateY(-11px) scale(.95)
    }

    .arc-slot[data-pos="2"] {
      transform: translateX(136px) rotate(5deg) translateY(-5px) scale(.85)
    }

    .arc-slot[data-pos="3"] {
      transform: translateX(204px) rotate(7.5deg) translateY(3px) scale(.75)
    }

    .arc-item[data-pos="1"] {
      transform: rotate(4deg) translateY(4px) scale(.95)
    }

    .arc-item[data-pos="2"] {
      transform: rotate(8deg) translateY(10px) scale(.85)
    }

    .arc-item[data-pos="3"] {
      transform: rotate(12deg) translateY(18px) scale(.75)
    }

    .gallery-ov {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: var(--bg);
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--dp) var(--ease), visibility var(--dp);
      overflow-y: auto
    }

    .gallery-ov.active {
      opacity: 1;
      visibility: visible
    }

    .gallery-hdr {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2.5rem;
      background: var(--bg);
      border-bottom: 1px solid var(--sand)
    }

    .gallery-title {
      font-family: var(--ff);
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--ink)
    }

    .gallery-close {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
      border: 1px solid var(--sand);
      background: var(--bg2);
      cursor: pointer;

    const books = [...booksData].sort(() => Math.random() - .5);
    let currentIndex = 0, isTransitioning = false, activeBg = 1, collection = [], currentFilter = null, arcToggle = false;
    const bb1 = document.getElementById('bb1'), bb2 = document.getElementById('bb2'), sliderTrack = document.getElementById('sliderTrack'), arcTrack = document.getElementById('arcTrack'), galleryOv = document.getElementById('galleryOv'), galleryGrid = document.getElementById('galleryGrid'), collOv = document.getElementById('collOv'), collGrid = document.getElementById('collGrid'), collPreview = document.getElementById('collPreview'), collItems = document.getElementById('collItems'), folderBadge = document.getElementById('folderBadge');

    function getFilteredBooks() {
      if (!currentFilter) return booksData;
      if (currentFilter === 'popularity') return booksData.filter(b => b.bestsellers >= 5);
      if (currentFilter === 'length') return booksData.filter(b => b.description.length > 80);
      if (currentFilter === 'category') return booksData.filter(b => b.genres.some(g => ['Fiction', 'Literary Fiction', 'Fantasy'].includes(g)));
      return booksData;
    }

    const galleryFilters = document.getElementById('galleryFilters');
    const filterTrigger = document.getElementById('filterTrigger');
    filterTrigger.addEventListener('click', () => galleryFilters.classList.toggle('active'));

    document.querySelectorAll('.filter-opt').forEach(opt => {
      opt.addEventListener('click', () => {
        const type = opt.dataset.type;
        if (currentFilter === type) {
          currentFilter = null;
          opt.classList.remove('active');
        } else {
          currentFilter = type;
          document.querySelectorAll('.filter-opt').forEach(o => o.classList.remove('active'));
          opt.classList.add('active');
        }
        galleryFilters.classList.remove('active');
        openGallery();
      });
    });

    document.addEventListener('click', e => {
      if (!galleryFilters.contains(e.target)) galleryFilters.classList.remove('active');
    });

    function getStatusClass(s) { return s === 'available' ? 'avail' : s === 'reserved' ? 'reserved' : 'unavail' }
    function getStatusText(s) { return s === 'available' ? 'Available' : s === 'reserved' ? 'Reserved' : 'Unavailable' }
    function isInColl(id) { return collection.some(c => c.id === id) }
    function getButtonState(book) {
      if (book.status === 'unavailable') return { text: 'Purchased', cls: '', disabled: true };
      if (book.status === 'reserved') return { text: 'Pay to get it now', cls: 'reserved', disabled: false };
      if (isInColl(book.id)) return { text: 'Remove', cls: 'in-coll', disabled: false };
      return { text: 'Add', cls: '', disabled: false };
    }

    function getLengthInfo(len) {
      if (len < 200) return { label: 'Short read', icon: 'M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zm1-13h-2v6l5.25 3.15.75-1.23-4-2.37z' };
      if (len < 400) return { label: 'Medium read', icon: 'M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z' };
      return { label: 'Long read', icon: 'M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42C16.07 4.74 14.12 4 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z' };
    }

    function getCategory(genres) {
      const nf = ['History', 'Biography', 'Memoir', 'Food', 'Philosophy', 'Self-Help', 'Science', 'Travel', 'Nature', 'Psychology', 'Politics', 'Health', 'Indigenous'];
      return genres.some(g => nf.includes(g)) ? 'NON-FICTION' : 'FICTION';
    }

    function createSlide(book, idx) {
      const sc = getStatusClass(book.status), st = getStatusText(book.status), bs = getButtonState(book);
      // Mock length based on description length for demo
      const len = 150 + (book.description.length * 2);
      const li = getLengthInfo(len);
      const cat = getCategory(book.genres);

      return `<div class="slide"><div class="panel-cover"><div class="cover-c"><div class="book-cover"><img src="${book.coverImage}" alt="${book.title}"></div></div></div><div class="panel-content"><div class="content-w"><div class="status-badge"><span class="status-dot ${sc}"></span><span class="status-text ${sc}">${st}</span></div><div class="title-row"><h1 class="book-title">${book.title}</h1><button class="add-btn ${bs.cls}" data-idx="${idx}"${bs.disabled ? ' disabled' : ''}>${bs.text}</button></div><p class="book-subtitle">${book.subtitle}</p><div class="book-desc"><p>${book.description}</p></div><div class="book-meta-row" style="display:flex;align-items:center;gap:6px;margin-bottom:1.5rem;color:var(--stone);font-family:var(--fs);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;font-weight:500">${cat} &bull; ${li.label}</div><div class="genre-tags">${book.genres.map(g => `<span class="genre-tag">${g}</span>`).join('')}</div><div class="author-sec"><div class="author-name">${book.author}</div><div class="author-acc">${book.bestsellers} × Bestseller books</div></div></div></div></div>`;
    }

    function initSlider() {
      sliderTrack.innerHTML = books.map((b, i) => createSlide(b, i)).join('');
      updateSliderPosition();
      updateBg(true);
      initArc();
      bindAddBtns();
    }

    function updateSliderPosition() {
      Array.from(sliderTrack.children).forEach((slide, i) => {
        slide.classList.toggle('active', i === currentIndex);
      });
    }

    function updateBg(imm = false) {
      const book = books[currentIndex], inc = activeBg === 1 ? bb2 : bb1, out = activeBg === 1 ? bb1 : bb2;
      inc.style.backgroundImage = `url(${book.coverImage})`;
      if (imm) { inc.classList.add('active') }
      else { setTimeout(() => { inc.classList.add('active'); out.classList.remove('active') }, 50) }
      activeBg = activeBg === 1 ? 2 : 1;
    }

    function initArc() {
      const track = document.getElementById('arcTrack');
      track.innerHTML = '';
      for (let i = -3; i <= 3; i++) {
        const slot = document.createElement('div');
        slot.className = 'arc-slot';
        slot.dataset.pos = i;
        slot.innerHTML = `<div class="arc-thumb"><img class="l1 active" src=""><img class="l2" src=""></div><div class="arc-label-c"><div class="arc-label"></div></div>`;
        slot.addEventListener('click', () => navigate(i));
        track.appendChild(slot);
      }
      updateArc();
    }

    function updateArc() {
      const track = document.getElementById('arcTrack');
      for (let i = -3; i <= 3; i++) {
        const idx = (currentIndex + i + books.length) % books.length;
        const book = books[idx];
        const slot = track.querySelector(`.arc-slot[data-pos="${i}"]`);
        if (!slot) continue;

        const imgInc = arcToggle ? slot.querySelector('.l2') : slot.querySelector('.l1');
        const imgOut = arcToggle ? slot.querySelector('.l1') : slot.querySelector('.l2');
        const txt = slot.querySelector('.arc-label'); // Single label

        imgInc.src = book.coverImage;
        txt.textContent = book.title;

        imgInc.classList.add('active');
        imgOut.classList.remove('active');

        // Ensure text active state matches specific slot
        // CSS handles slot 0 highlighting logic, we just set content
        if (i === 0) txt.classList.add('active'); // Keeping class for consistency if used by css
      }
      arcToggle = !arcToggle;
    }

    function goToBook(idx) {
      if (isTransitioning || idx === currentIndex) return;
      isTransitioning = true;
      sliderTrack.classList.add('transitioning');
      currentIndex = idx;
      updateSliderPosition();
      updateBg();
      updateArc();
      bindAddBtns();
      setTimeout(() => sliderTrack.classList.remove('transitioning'), 650);
      setTimeout(() => isTransitioning = false, 650);
    }

    function navigate(dir) {
      if (isTransitioning) return;
      isTransitioning = true;
      sliderTrack.classList.add('transitioning');
      currentIndex = (currentIndex + dir + books.length) % books.length;
      updateSliderPosition();
      updateBg();
      updateArc();
      bindAddBtns();
      setTimeout(() => sliderTrack.classList.remove('transitioning'), 650);
      setTimeout(() => isTransitioning = false, 650);
    }

    function bindAddBtns() {
      document.querySelectorAll('.add-btn').forEach(btn => {
        btn.onclick = () => {
          const idx = parseInt(btn.dataset.idx), book = books[idx];
          if (book.status === 'unavailable') return;
          if (book.status === 'reserved') {
            if (!isInColl(book.id)) { collection.push({ ...book, addedAt: Date.now() }); btn.classList.add('in-coll'); btn.classList.remove('reserved'); btn.textContent = 'Remove' }
            else { collection = collection.filter(c => c.id !== book.id); btn.classList.remove('in-coll'); btn.classList.add('reserved'); btn.textContent = 'Pay to get it now' }
          } else {
            if (isInColl(book.id)) { collection = collection.filter(c => c.id !== book.id); btn.classList.remove('in-coll'); btn.textContent = 'Add' }
            else { collection.push({ ...book, addedAt: Date.now() }); btn.classList.add('in-coll'); btn.textContent = 'Remove' }
          }
          updateCollUI();
        };
      });
    }

    function updateCollUI() {
      const cnt = collection.length;
      folderBadge.textContent = cnt;
      folderBadge.classList.toggle('visible', cnt > 0);
      const recent = [...collection].sort((a, b) => b.addedAt - a.addedAt).slice(0, 3);
      if (recent.length) {
        collItems.innerHTML = recent.map(b => `<div class="coll-item"><div class="coll-thumb"><img src="${b.coverImage}"></div><div class="coll-title">${b.title}</div></div>`).join('');
      } else {
        collItems.innerHTML = '<div class="coll-empty">No books in collection</div>';
      }
    }

    function openCollModal() {
      collPreview.classList.remove('open');
      if (!collection.length) {
        collGrid.innerHTML = '<div class="coll-empty-state"><div class="coll-empty-text">You haven\'t added any books</div><button class="coll-add-books-btn" id="collAddBooksBtn">Add books</button></div>';
        document.getElementById('collAddBooksBtn').addEventListener('click', () => {
          collOv.classList.remove('active');

      } else {
        collGrid.innerHTML = collection.map(b => {
          const sc = getStatusClass(b.status);
          return `<div class="coll-card" data-id="${b.id}"><div class="coll-card-status ${sc}"></div><button class="coll-remove" data-id="${b.id}">−</button><div class="coll-card-img"><img src="${b.coverImage}"></div><div class="coll-card-title">${b.title}</div><div class="coll-card-desc">${b.description}</div><div class="coll-card-tags">${b.genres.map(g => `<span class="coll-card-tag">${g}</span>`).join('')}</div></div>`;
        }).join('');
        collGrid.querySelectorAll('.coll-remove').forEach(btn => {
          btn.onclick = e => {
            e.stopPropagation();
            if (btn.classList.contains('confirm')) {
              const id = parseInt(btn.dataset.id);

              setTimeout(() => { if (btn.classList.contains('confirm')) { btn.classList.remove('confirm'); btn.textContent = '−' } }, 2000);
            }

      collOv.classList.add('active');

    function getStatusTagHTML(book, inColl) {
      if (!book) return '';
      const sc = getStatusClass(book.status);
      const isAvail = book.status === 'available';
      if (inColl && isAvail) return '<span class="gallery-status-tag added">Added</span>';

      let text = 'Available';
      if (book.status === 'reserved') text = 'Reserved';
      if (book.status === 'unavailable') text = 'Unavailable';

      return `<span class="gallery-status-tag ${sc}">${text}</span>`;
    }

    function openGallery() {
      const filtered = getFilteredBooks().sort((a, b) => a.title.localeCompare(b.title));
      const groups = {};
      filtered.forEach(b => {
        const l = b.title[0].toUpperCase();
        if (!groups[l]) groups[l] = [];
        groups[l].push(b);
      });

      const letters = Object.keys(groups).sort();

      galleryGrid.innerHTML = letters.map(l => {
        const list = groups[l];
        const items = list.map(b => {
          const origIdx = books.findIndex(x => x.id === b.id);
          const inC = isInColl(b.id);
          const canAdd = b.status === 'available' || b.status === 'reserved';
          const isReserved = b.status === 'reserved';
          const btnText = inC ? '−' : (isReserved ? '$' : '+');

          return `<div class="gallery-item" data-index="${origIdx}" data-id="${b.id}"><div class="gallery-cover">${getStatusTagHTML(b, inC)}<img src="${b.coverImage}">${canAdd ? `<button class="gallery-add-btn${btnCls}" data-id="${b.id}">${btnText}</button>` : ''}</div><div class="gallery-info"><div class="gallery-book-title">${b.title}</div><div class="gallery-author">${b.author}</div></div></div>`;
        }).join('');
        return `<div class="gallery-section"><div class="gallery-letter">${l}</div><div class="gallery-group">${items}</div></div>`;
      }).join('');

      // Add collapse listeners
      galleryGrid.querySelectorAll('.gallery-letter').forEach(hdr => {
        hdr.addEventListener('click', () => {
          hdr.parentElement.classList.toggle('collapsed');

      });

      galleryGrid.querySelectorAll('.gallery-item').forEach(el => {
        el.addEventListener('click', e => {

      galleryGrid.querySelectorAll('.gallery-add-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const id = parseInt(btn.dataset.id);
          const book = booksData.find(b => b.id === id);
          const galleryItem = btn.closest('.gallery-item');
          const galleryCover = galleryItem.querySelector('.gallery-cover');
          let statusTag = galleryCover.querySelector('.gallery-status-tag');

          if (isInColl(id)) {
            collection = collection.filter(c => c.id !== id);
            btn.classList.remove('in-coll');
            if (book.status === 'reserved') {
              btn.classList.add('buy');
              btn.textContent = '$';
            } else {
              btn.textContent = '+';

            // Revert logic
            if (!statusTag) {
              // Should normally exist, but safety check
              galleryCover.insertAdjacentHTML('afterbegin', `<span class="gallery-status-tag ${getStatusClass(book.status)}">Available</span>`);
              statusTag = galleryCover.querySelector('.gallery-status-tag');
            }
            if (statusTag) {
              const sc = getStatusClass(book.status);
              const text = book.status === 'available' ? 'Available' : 'Reserved';
              statusTag.className = `gallery-status-tag ${sc}`;
              statusTag.textContent = text;
            }
          } else {
            collection.push({ ...book, addedAt: Date.now() });
            btn.classList.add('in-coll');
            btn.classList.remove('buy');
            btn.textContent = '−';

            // Update logic
            if (statusTag && book.status === 'available') {
              statusTag.className = 'gallery-status-tag added';
              statusTag.textContent = 'Added';
            }
          }
          updateCollUI();
        });
      });
      galleryOv.classList.add('active');
    }



    document.getElementById('prevBtn').addEventListener('click', () => navigate(-1));
    document.getElementById('nextBtn').addEventListener('click', () => navigate(1));
    document.getElementById('themeToggle').addEventListener('click', () => document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
    document.getElementById('fullListBtn').addEventListener('click', openGallery);
    document.getElementById('galleryClose').addEventListener('click', () => galleryOv.classList.remove('active'));
    document.getElementById('folderBtn').addEventListener('click', () => collPreview.classList.toggle('open'));
    document.getElementById('viewAllBtn').addEventListener('click', openCollModal);
    document.getElementById('collClose').addEventListener('click', () => collOv.classList.remove('active'));
    document.getElementById('collOv').addEventListener('click', e => { if (e.target === collOv) collOv.classList.remove('active') });
    document.addEventListener('keydown', e => { if (galleryOv.classList.contains('active') || collOv.classList.contains('active')) { if (e.key === 'Escape') { galleryOv.classList.remove('active'); collOv.classList.remove('active') } return } if (e.key === 'ArrowLeft') navigate(-1); if (e.key === 'ArrowRight') navigate(1) });
    let wt; document.addEventListener('wheel', e => { if (galleryOv.classList.contains('active') || collOv.classList.contains('active')) return; e.preventDefault(); clearTimeout(wt); wt = setTimeout(() => { if (Math.abs(e.deltaY) > 30) navigate(e.deltaY > 0 ? 1 : -1) }, 50) }, { passive: false });
    let tsx = 0; document.addEventListener('touchstart', e => { tsx = e.touches[0].clientX }, { passive: true }); document.addEventListener('touchend', e => { const d = tsx - e.changedTouches[0].clientX; if (Math.abs(d) > 60) navigate(d > 0 ? 1 : -1) }, { passive: true });
    document.addEventListener('click', e => { if (!e.target.closest('.folder-btn') && !e.target.closest('.coll-preview')) collPreview.classList.remove('open') });
    initSlider(); updateCollUI();

    // Intro Logic - Moved to inline script for visual stability
    // Clean up if needed
    if (!document.body.classList.contains('skip-intro')) {
      setTimeout(() => {
        const ios = document.getElementById('introOverlay');
        if (ios) {
          // Animation ends
          ios.style.display = 'none';
          localStorage.setItem('giftingIntroSeen', 'true');
        }
      }, 4500); // 4.5s match css
    }

    // Smooth font loading trigger
    document.fonts.ready.then(() => {
      document.body.classList.add('loaded');
    });
    // Fallback safety
    setTimeout(() => document.body.classList.add('loaded'), 2000);

    // Filter button logic
    document.getElementById('filterBtn').addEventListener('click', () => {
      openGallery();
      setTimeout(() => {
        document.getElementById('galleryFilters').classList.add('active');
      }, 300);
    });
  </script>
</body>
</html>
