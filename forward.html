<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pages Forward | Decide</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/gifting-theme.css">

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23DFBD69' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='8' width='18' height='4' rx='1'/><path d='M12 8v13'/><path d='M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7'/><path d='M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5'/></svg>">
</head>

<body>
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#DFBD69;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#F9ECA5;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#B88A44;stop-opacity:1" />
      </linearGradient>
    </defs>
  </svg>

  <!-- Backgrounds -->
  <div class="blur-c">
    <div class="blur-bg" id="bb1"></div>
    <div class="blur-bg" id="bb2"></div>
    <div class="blur-ov"></div>
  </div>
  <div class="bg-right"></div>

  <!-- Header -->
  <header class="header">
    <a href="index.html" class="header-logo">
      Pages Forward
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#gold-grad)" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="8" width="18" height="4" rx="1" />
        <path d="M12 8v13" />
        <path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7" />
        <path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5" />
      </svg>
    </a>
    <div class="header-actions">
      <!-- Theme Toggle -->
      <button class="btn-h btn-icon" id="themeToggle"><svg viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg></button>

      <!-- Navigation -->
      <a href="explore.html" class="btn-h">Explore</a>
      <a href="collection.html" class="btn-h">Collection</a>
    </div>
  </header>

  <!-- Main Viewport -->
  <div class="slider-vp">
    <div class="slider-track" id="mainContainer">
      <!-- Content injected by JS -->
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script>
    (async function () {
      'use strict';

      // Theme logic
      const themeToggle = document.getElementById('themeToggle');
      if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
      });

      await PF.State.init();
      if (!PF.State.isOnboardingComplete()) {
        window.location.href = 'index.html';
        return;
      }

      const main = document.getElementById('mainContainer');
      const bb1 = document.getElementById('bb1');
      const bb2 = document.getElementById('bb2');
      let activeBg = 1;

      function updateBg(imgUrl) {
        const inc = activeBg === 1 ? bb2 : bb1;
        const out = activeBg === 1 ? bb1 : bb2;
        inc.style.backgroundImage = `url(${imgUrl})`;
        inc.classList.add('active');

        // Small delay to allow fade in before removing old one
        setTimeout(() => {
          if (inc.classList.contains('active')) out.classList.remove('active');
        }, 300); // match css transition roughly

        activeBg = activeBg === 1 ? 2 : 1;
      }

      function getStatusClass(s) { return s === 'available' ? 'avail' : s === 'reserved' ? 'reserved' : 'unavail' }
      function getStatusText(s) { return s === 'available' ? 'Available' : s === 'reserved' ? 'Reserved' : 'Unavailable' }

      function render() {
        const availableBooks = PF.State.getAvailableBooks(PF.booksData);

        if (availableBooks.length === 0) {
          main.innerHTML = `
            <div class="slide active">
                <div class="panel-cover" style="justify-content:center; padding: 0;">
                    <div style="text-align:center; padding: 2rem;">
                         <div style="font-family:var(--ff); font-size: 2rem; margin-bottom: 1rem; color: var(--ink);">You've seen all the books!</div>
                         <p style="font-family:var(--fb); color: var(--umber); margin-bottom: 2rem;">Visit your collection to see what you've saved.</p>
                         <a href="collection.html" class="add-btn" style="padding: 1rem 2rem; font-size: 0.8rem;">View Collection</a>
                    </div>
                </div>
            </div>`;
          return;
        }

        const book = availableBooks[0];
        updateBg(book.coverImage);

        const sc = getStatusClass(book.status);
        const st = getStatusText(book.status);

        // Animation transition
        main.style.opacity = '0';
        setTimeout(() => {
          main.innerHTML = `
            <div class="slide active">
                <div class="panel-cover">
                    <div class="cover-c">
                        <div class="book-cover">
                            <img src="${book.coverImage}" alt="${book.title}">
                        </div>
                        ${book.bestseller ? `
                        <div class="gold-ribbon"></div>
                        <div class="bestseller-text">International Bestseller</div>
                        ` : ''}
                    </div>
                </div>
                <div class="panel-content">
                    <div class="content-w">
                        <div class="title-row">
                            <h1 class="book-title">${book.title}</h1>
                        </div>
                        <p class="book-subtitle">${book.subtitle}</p>
                        <div class="book-desc">
                            <p>${book.description}</p>
                        </div>
                        <div class="genre-tags">
                            <span class="genre-tag" style="border-color:var(--amber); color:var(--amber)">${book.tags.type}</span>
                            <span class="genre-tag">${book.tags.category}</span>
                            <span class="genre-tag">${book.tags.niche}</span>
                            <span class="status-pill ${sc}">${st}</span>
                        </div>
                        <div class="author-sec">
                            <div class="author-name">${book.author}</div>
                            <div class="author-acc">Pages Forward Selection</div>
                            
                            <div style="display:flex; gap: 1rem; margin-top: 2rem;">
                                <button class="add-btn" id="dismissBtn" style="border-color:var(--red); color:var(--red)">Dismiss</button>
                                <button class="add-btn" id="acceptBtn" style="background:var(--avail); color:#fff; border-color:var(--avail)">Accept Book</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;

          main.style.opacity = '1';

          document.getElementById('dismissBtn').onclick = async () => {
            await PF.State.dismissBook(book.id);
            render();
          };
          document.getElementById('acceptBtn').onclick = async () => {
            await PF.State.acceptBook(book.id);
            render();
          };

        }, 300);
      }

      render();
    })();
  </script>
</body>

</html>
