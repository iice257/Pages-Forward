<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Pages Forward - A forward-only book discovery experience. Once you move on, there's no going back.">
  <title>Pages Forward</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dark.css">

  <!-- Favicon -->
  <link rel="icon" href="assets/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

  <style>
    /* Onboarding-specific styles */
    .onboarding {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0A0A0A;
      color: #F5F5F5;
    }

    .onboarding-content {
      text-align: center;
      padding: 2rem;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    .onboarding-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .onboarding-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(3rem, 12vw, 7rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.05;
      text-align: center;
    }

    .onboarding-arrow {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 8vw, 4rem);
      color: #D4AF37;
      margin-top: 0.5rem;
      animation: arrowPulse 2s ease-in-out infinite;
    }

    @keyframes arrowPulse {

      0%,
      100% {
        opacity: 1;
        transform: translateX(0);
      }

      50% {
        opacity: 0.7;
        transform: translateX(10px);
      }
    }

    .onboarding-subtext {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #666;
      margin-top: 3rem;
    }

    .onboarding-btn {
      margin-top: 3rem;
      padding: 0.875rem 2.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      background: transparent;
      border: 1px solid #444;
      color: #F5F5F5;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .onboarding-btn:hover {
      background: #F5F5F5;
      color: #0A0A0A;
      border-color: #F5F5F5;
    }

    .animate-fade-in {
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div id="onboardingContainer" class="onboarding">
    <!-- Content injected by onboarding.js -->
  </div>

  <!-- Scripts -->
  <script src="js/state.js"></script>
  <script src="js/onboarding.js"></script>
  <script>
    // Initialize onboarding
    (async function () {
      const needsOnboarding = await PF.Onboarding.check();
      if (needsOnboarding) {
        PF.Onboarding.show();
      }
    })();
  </script>
</body>

</html>
